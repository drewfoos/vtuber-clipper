[download]
quality = "1080p60"

[transcribe]
model = "distil-large-v3"
device = "cuda"
compute_type = "float16"

[audio_peaks]
db_above_baseline = 6.0
min_duration_seconds = 1.0
merge_gap_seconds = 2.0
target_count = 40                  # cap peaks; keep loudest dB-above-baseline

[chat_peaks]
bucket_seconds = 2.0
rolling_baseline_seconds = 300.0   # 5-minute local "what's normal lately" window
surge_multiplier = 3.0              # peak must be 3x the rolling baseline
absolute_floor = 3.0                # AND must clear this raw weight (dead-air guard)
min_gap_seconds = 60.0
target_count = 40                   # cap peaks at this; keep biggest surges
hype_regex = "\\b(KEKW|LULW|PogChamp|POG|OMEGALUL|LMAO|LOL|W|WTF|HOLY|JESUS|NO WAY|LETS GO|LETSGO|GG)\\b"

[candidates]
overlap_tolerance_seconds = 5.0
min_clip_seconds = 25.0
max_clip_seconds = 90.0
include_chat_only = true

[rank]
backend = "ollama"
ollama_model = "llama3.1:8b"
anthropic_model = "claude-haiku-4-5-20251001"
max_clips = 20
min_score = 60
